<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#07111f" />
  <title>KHL Club Web App</title>
  <style>
    :root{
      --bg1:#07111f;
      --bg2:#0f172a;
      --bg3:#111827;
      --card:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.12);
      --text:#fff;
      --muted:#b6c0d1;
      --cyan:#48d7ff;
      --red:#ef4444;
      --green:#22c55e;
      --amber:#f59e0b;
      --violet:#8b5cf6;
      --gold:#f7cc72;
      --blue:#93e8ff;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top, rgba(56,189,248,.18), transparent 25%),
        linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 35%,var(--bg3) 100%);
      min-height:100vh;
    }
    button,input,select{font:inherit}
    button{cursor:pointer}
    .app{max-width:1280px;margin:0 auto;padding:16px 16px 100px}
    .hero{display:flex;flex-direction:column;gap:16px}
    .eyebrow{font-size:12px;letter-spacing:.28em;text-transform:uppercase;color:var(--blue)}
    h1{margin:0;font-size:34px;line-height:1.05}
    h2{margin:0;font-size:24px}
    h3{margin:0;font-size:18px}
    p{margin:0}
    .sub{color:var(--muted);font-size:15px;line-height:1.5;max-width:900px}
    .top-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .mini-card,.card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:24px;
      box-shadow:0 12px 32px rgba(0,0,0,.18);
      backdrop-filter: blur(10px);
    }
    .mini-card{padding:14px}
    .mini-label{font-size:12px;color:var(--muted)}
    .mini-value{font-size:28px;font-weight:800;margin-top:6px}
    .desktop-tabs,.bottom-nav,.subtabs{
      display:grid;
      gap:8px;
    }
    .desktop-tabs{grid-template-columns:repeat(4,1fr);margin-top:18px}
    .bottom-nav{
      position:fixed;left:0;right:0;bottom:0;z-index:50;
      padding:10px 12px calc(10px + env(safe-area-inset-bottom));
      background:rgba(2,8,23,.96);
      border-top:1px solid var(--border);
      backdrop-filter: blur(16px);
      grid-template-columns:repeat(4,1fr);
    }
    .subtabs{grid-template-columns:repeat(3,1fr)}
    .tab-btn,.nav-btn,.subtab-btn,.btn,.rating-btn{
      border:1px solid var(--border);
      background:rgba(255,255,255,.07);
      color:#fff;
      border-radius:16px;
      padding:12px 10px;
      font-weight:700;
      font-size:14px;
      min-height:46px;
    }
    .tab-btn.active,.nav-btn.active,.subtab-btn.active,.btn.primary{
      background:var(--cyan);
      color:#062033;
      border-color:transparent;
    }
    .btn.secondary{background:rgba(255,255,255,.08)}
    .btn.danger{background:rgba(239,68,68,.18);color:#ffd6d6}
    .btn.green{background:rgba(34,197,94,.18);color:#dcffe9}
    .btn.gold{background:rgba(247,204,114,.18);color:#ffe9ba}
    .section{display:none;margin-top:16px}
    .section.active{display:block}
    .layout{display:grid;grid-template-columns:1fr;gap:16px}
    .left-col,.right-col{display:flex;flex-direction:column;gap:16px}
    .card{padding:16px}
    .card-head{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-bottom:14px;
    }
    .head-note{
      display:inline-flex;
      align-self:flex-start;
      border:1px solid rgba(72,215,255,.22);
      background:rgba(72,215,255,.12);
      color:#c9f6ff;
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:700;
    }
    .grid-2{display:grid;grid-template-columns:1fr;gap:12px}
    .grid-3{display:grid;grid-template-columns:1fr;gap:12px}
    .stat-card{padding:18px}
    .stat-title{font-size:13px;color:var(--muted)}
    .stat-value{font-size:36px;font-weight:900;margin-top:8px}
    .stat-sub{font-size:12px;color:var(--muted);margin-top:6px}
    .label{display:block;margin:0 0 6px;color:#dde8f5;font-size:14px}
    .input,.select{
      width:100%;
      background:rgba(255,255,255,.05);
      color:#fff;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px 12px;
      font-size:16px;
      outline:none;
    }
    .input:focus,.select:focus{border-color:rgba(72,215,255,.4)}
    .rating-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
    .rating-btn.active{background:rgba(245,158,11,.18);border-color:#f7d18d;color:#ffe9ba}
    .hint{font-size:12px;color:var(--muted);line-height:1.45}
    .error{
      padding:12px;
      border-radius:16px;
      background:rgba(239,68,68,.14);
      border:1px solid rgba(239,68,68,.24);
      color:#ffd6d6;
      font-size:14px;
    }
    .player-list{display:flex;flex-direction:column;gap:10px}
    .player{
      border:1px solid var(--border);
      background:rgba(255,255,255,.05);
      border-radius:18px;
      padding:14px;
    }
    .player.injured{
      background:rgba(239,68,68,.10);
      border-color:rgba(239,68,68,.35);
    }
    .player-title{font-size:18px;font-weight:800}
    .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:700;
      border:1px solid transparent;
    }
    .nap{background:rgba(244,63,94,.16);color:#ffd5df;border-color:rgba(244,63,94,.26)}
    .zas{background:rgba(56,189,248,.16);color:#d8f3ff;border-color:rgba(56,189,248,.26)}
    .vrt{background:rgba(34,197,94,.16);color:#dcffe9;border-color:rgba(34,197,94,.26)}
    .rating{background:rgba(245,158,11,.14);color:#ffe9ba}
    .starter{background:rgba(139,92,246,.18);color:#efe4ff}
    .bench{background:rgba(100,116,139,.22);color:#e8eef9}
    .inj{background:rgba(239,68,68,.18);color:#ffd2d2}
    .legioner{background:rgba(247,204,114,.18);color:#ffe9ba;border-color:rgba(247,204,114,.22)}
    .sng{background:rgba(34,197,94,.14);color:#d9ffe8;border-color:rgba(34,197,94,.24)}
    .player-stats{
      display:grid;
      grid-template-columns:1fr;
      gap:6px;
      color:#dce6f5;
      font-size:14px;
      margin-top:10px;
    }
    .player-actions{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:8px;
      margin-top:12px;
    }
    .empty{
      padding:18px;
      border:1px dashed var(--border);
      border-radius:18px;
      color:var(--muted);
      text-align:center;
    }
    .bonus{
      padding:12px;
      border-radius:16px;
      background:rgba(34,197,94,.14);
      border:1px solid rgba(34,197,94,.24);
      color:#dcffe9;
    }
    .stack{display:flex;flex-direction:column;gap:10px}
    .small-box{
      padding:14px;
      border:1px solid var(--border);
      border-radius:18px;
      background:rgba(255,255,255,.05);
    }
    .small-box .v{font-size:28px;font-weight:900;margin-top:6px}
    .leaders-grid{display:grid;grid-template-columns:1fr;gap:12px}
    .leader-card{
      padding:16px;
      border:1px solid var(--border);
      border-radius:20px;
      background:rgba(255,255,255,.05);
    }
    .leader-head{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }
    .leader-total{
      border-radius:16px;
      padding:10px 14px;
      background:rgba(245,158,11,.16);
      text-align:center;
    }
    .table{
      overflow:hidden;
      border-radius:18px;
      border:1px solid var(--border);
      margin-top:12px;
    }
    .table-row{
      display:grid;
      grid-template-columns:.7fr 2fr .9fr .9fr .9fr;
      gap:8px;
      padding:12px 14px;
      font-size:14px;
    }
    .table-row:nth-child(odd){background:rgba(255,255,255,.05)}
    .table-row:nth-child(even){background:rgba(255,255,255,.03)}
    .table-header{background:rgba(255,255,255,.1);font-weight:800}
    .history{display:flex;flex-direction:column;gap:10px;max-height:430px;overflow:auto}
    .history-item{
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--border);
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }
    .history-actions{display:flex;gap:8px;align-items:center}
    .mini-delete{
      border:1px solid rgba(239,68,68,.24);
      background:rgba(239,68,68,.14);
      color:#ffd6d6;
      border-radius:12px;
      padding:8px 10px;
      font-weight:700;
    }
    .rules-header{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      margin-bottom:16px;
    }
    .rules-grid{display:grid;grid-template-columns:1fr;gap:12px}
    .rule-block{
      padding:16px;
      border-radius:20px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.05);
    }
    .rule-block h3{margin:0 0 10px;font-size:18px}
    .rule-list{display:flex;flex-direction:column;gap:8px;color:#dce6f5;font-size:14px;line-height:1.45}
    .quick-grid{display:grid;grid-template-columns:1fr;gap:12px}
    .quick-card{
      padding:16px;
      border-radius:20px;
      border:1px solid rgba(72,215,255,.18);
      background:rgba(72,215,255,.08);
    }
    .modal-bg{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.65);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:80;
      padding:14px;
    }
    .modal-bg.show{display:flex}
    .modal{
      width:100%;
      max-width:560px;
      max-height:92vh;
      overflow:auto;
      background:#07111f;
      border:1px solid var(--border);
      border-radius:24px;
      padding:18px;
      box-shadow:0 20px 50px rgba(0,0,0,.45);
    }
    .modal h3{margin:0 0 12px;font-size:24px}
    .modal-actions{display:flex;gap:8px;justify-content:space-between;flex-wrap:wrap;margin-top:14px}
    .mobile-only{display:grid}
    .desktop-only{display:none}
    @media (min-width: 900px){
      .app{padding:24px 24px 28px}
      h1{font-size:48px}
      .top-stats{grid-template-columns:repeat(4,1fr)}
      .layout{grid-template-columns:1.45fr .85fr}
      .grid-2{grid-template-columns:1fr 1fr}
      .grid-3{grid-template-columns:repeat(3,1fr)}
      .leaders-grid{grid-template-columns:repeat(3,1fr)}
      .rules-header{grid-template-columns:1.2fr .8fr}
      .quick-grid{grid-template-columns:repeat(3,1fr)}
      .card-head{flex-direction:row;justify-content:space-between;align-items:flex-start}
      .player-actions{grid-template-columns:repeat(4,auto)}
      .mobile-only{display:none}
      .desktop-only{display:grid}
      .bottom-nav{display:none}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <div>
        <div class="eyebrow">KHL Boardgame Web</div>
        <h1>Менеджер хоккейного клуба</h1>
        <div class="sub">Обновлённая версия для публикации. Исправлена таблица лидеров, клуб стартует пустым, а добавленные матчи можно удалять.</div>
      </div>
      <div class="top-stats" id="topStats"></div>
    </div>

    <div class="desktop-tabs desktop-only">
      <button class="tab-btn active" data-screen="club">Мой Клуб</button>
      <button class="tab-btn" data-screen="matches">Матчи</button>
      <button class="tab-btn" data-screen="leaders">Лидеры</button>
      <button class="tab-btn" data-screen="rules">Правила</button>
    </div>

    <section class="section active" id="screen-club"></section>
    <section class="section" id="screen-matches"></section>
    <section class="section" id="screen-leaders"></section>
    <section class="section" id="screen-rules"></section>
  </div>

  <div class="bottom-nav mobile-only">
    <button class="nav-btn active" data-screen="club">Клуб</button>
    <button class="nav-btn" data-screen="matches">Матчи</button>
    <button class="nav-btn" data-screen="leaders">Лидеры</button>
    <button class="nav-btn" data-screen="rules">Правила</button>
  </div>

  <div class="modal-bg" id="playerModalBg">
    <div class="modal">
      <h3 id="playerModalTitle">Добавить игрока</h3>
      <div class="grid-2">
        <div style="grid-column:1/-1">
          <label class="label">Имя игрока</label>
          <input id="formName" class="input" placeholder="Например, Кирилл Иванов" />
        </div>
        <div>
          <label class="label">Позиция</label>
          <select id="formPosition" class="select">
            <option>НАП</option>
            <option>ЗАЩ</option>
            <option>ВРТ</option>
          </select>
        </div>
        <div>
          <label class="label">Рейтинг</label>
          <div class="rating-grid" id="ratingGrid"></div>
        </div>
        <div>
          <label class="label">Статус игрока</label>
          <select id="formOrigin" class="select">
            <option value="СНГ">СНГ</option>
            <option value="Легионер">Легионер</option>
          </select>
        </div>
        <div></div>
        <div>
          <label class="label">Атака</label>
          <input id="formAttack" class="input" type="number" inputmode="numeric" />
        </div>
        <div>
          <label class="label">Защита</label>
          <input id="formDefense" class="input" type="number" inputmode="numeric" />
        </div>
      </div>
      <div class="hint" style="margin-top:10px">Для вратаря атака автоматически становится 0.</div>
      <div id="formError" class="error" style="display:none;margin-top:12px"></div>
      <div class="modal-actions">
        <button class="btn danger" id="deleteFromEditBtn" style="display:none">Удалить игрока</button>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn secondary" id="cancelPlayerBtn">Отмена</button>
          <button class="btn primary" id="savePlayerBtn">Сохранить</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-bg" id="deleteModalBg">
    <div class="modal" style="max-width:420px">
      <h3>Удалить игрока</h3>
      <div class="sub" style="max-width:none">Вы точно хотите удалить игрока из состава?</div>
      <div id="deleteInfo" class="small-box" style="margin-top:12px"></div>
      <div class="modal-actions">
        <button class="btn secondary" id="cancelDeleteBtn">Отмена</button>
        <button class="btn danger" id="confirmDeleteBtn">Удалить</button>
      </div>
    </div>
  </div>

<script>

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return { players:[...initialPlayers], matches:[] };
    const parsed = JSON.parse(raw);
    return {
      players: Array.isArray(parsed.players) ? parsed.players : [...initialPlayers],
      matches: Array.isArray(parsed.matches) ? parsed.matches : []
    };
  } catch(e){
    return { players:[...initialPlayers], matches:[] };
  }
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function escapeHtml(str){
  return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
}
function starters(){ return state.players.filter(p=>p.lineup==="starter"); }
function benchPlayers(){ return state.players.filter(p=>p.lineup==="bench"); }
function healthyStarters(){ return starters().filter(p=>!p.injured); }
function starterCounts(players = state.players){
  return players.filter(p=>p.lineup==="starter").reduce((acc,p)=>{ acc[p.position]++; return acc; }, {"НАП":0,"ЗАЩ":0,"ВРТ":0});
}
function canBeStarter(position, candidateId = null){
  const counts = starterCounts(state.players.filter(p=>p.id!==candidateId));
  return counts[position] < STARTER_LIMITS[position];
}
function ratingStars(value){ return RATINGS.indexOf(value)+1; }
function posClass(position){
  if(position==="НАП") return "nap";
  if(position==="ЗАЩ") return "zas";
  return "vrt";
}
function originClass(origin){
  return origin==="Легионер" ? "legioner" : "sng";
}
function calcClubStats(){
  const hs = healthyStarters();
  const forwards = hs.filter(p=>p.position==="НАП");
  const defenders = hs.filter(p=>p.position==="ЗАЩ");
  const goalies = hs.filter(p=>p.position==="ВРТ");
  const legioners = hs.filter(p=>p.origin==="Легионер");

  let attack = forwards.reduce((sum,p)=>sum+Number(p.attack||0),0) + defenders.reduce((sum,p)=>sum+Number(p.attack||0),0);
  let defense = forwards.reduce((sum,p)=>sum+Number(p.defense||0),0) + defenders.reduce((sum,p)=>sum+Number(p.defense||0),0) + goalies.reduce((sum,p)=>sum+Number(p.defense||0),0);

  const bonuses = [];
  if(forwards.length===3){ attack += 3; bonuses.push("3 нападающих: +3 к атаке"); }
  if(forwards.length===4){ attack += 5; defense -= 2; bonuses.push("4 нападающих: +5 к атаке, −2 к защите"); }
  if(defenders.length===2){ defense += 3; bonuses.push("2 защитника: +3 к защите"); }
  if(defenders.length===3){ defense += 6; attack -= 3; bonuses.push("3 защитника: +6 к защите, −3 к атаке"); }
  if(hs.filter(p=>p.rating==="3×").length >= 3){ attack += 3; bonuses.push("Молодёжная тройка: +3 к атаке"); }
  if(legioners.length >= 3){ attack += 3; defense += 2; bonuses.push("3 легионера 🌍: +3 к атаке и +2 к защите"); }
  const cisPlayers = hs.filter(p => (p.origin || "СНГ") === "СНГ");
  if(hs.length === 6 && cisPlayers.length === 6){
    attack += 3;
    defense += 3;
    bonuses.push("Русская пятёрка: 6 игроков СНГ в основе дают +3 к атаке и +3 к защите");
  }

  return {
    attack: Math.max(0, attack),
    defense: Math.max(0, defense),
    bonuses,
    injuredCount: starters().filter(p=>p.injured).length,
    legioners: legioners.length
  };
}
function calcMatchStats(){
  let points = 0, wins = 0, winsOt = 0, losses = 0, lossesOt = 0;
  state.matches.forEach(m=>{
    const cfg = RESULT_OPTIONS.find(x=>x.value===m.result);
    if(!cfg) return;
    points += cfg.points;
    if(m.result==="WIN") wins++;
    if(m.result==="WIN_OT") winsOt++;
    if(m.result==="LOSS") losses++;
    if(m.result==="LOSS_OT") lossesOt++;
  });
  return {
    points, wins, winsOt, losses, lossesOt,
    total: state.matches.length,
    display: `${wins}/${winsOt}, ${losses + lossesOt}`
  };
}

        </div>
      </div>
      <div class="card">
        <h2>Быстрая памятка</h2>
        <div class="quick-grid" style="margin-top:12px">
          <div class="quick-card">
            <div class="mini-label">Матч</div>
            <div style="font-weight:800;margin-top:8px">0–2 → Д6 / Д6<br>+3–5 → Д8 / Д6<br>+6 → Д8 / Д4</div>
          </div>
          <div class="quick-card">
            <div class="mini-label">Состав</div>
            <div style="font-weight:800;margin-top:8px">2–4 НАП<br>1–3 ЗАЩ<br>1 ВРТ</div>
          </div>
          <div class="quick-card">
            <div class="mini-label">Веб бонус</div>
            <div style="font-weight:800;margin-top:8px">3 легионера 🌍<br>+3 Атака<br>+2 Защита</div>
          </div>
          <div class="quick-card">
            <div class="mini-label">Русская пятёрка</div>
            <div style="font-weight:800;margin-top:8px">6 игроков СНГ в основе<br>+3 Атака<br>+3 Защита</div>
          </div>
        </div>
      </div>
    </div>

    <div class="rules-grid">
      ${RULE_SECTIONS.map(section => `
        <div class="rule-block">
          <h3>${section.title}</h3>
          <div class="rule-list">
            ${section.items.map(item => `<div>• ${item}</div>`).join("")}
          </div>
        </div>
      `).join("")}
    </div>
  `;
}
function renderAll(){
  renderTop();
  renderClub();
  renderMatches();
  renderLeaders();
  renderRules();
  syncTabs();
}
function setClubTab(tab){
  ui.clubTab = tab;
  renderClub();
}
function buildInlineRatingButtons(){
  const container = document.getElementById("inlineRatingGrid");
  if(!container) return;
  container.innerHTML = RATINGS.map(r=>`<button class="rating-btn ${ui.inlineRating===r ? "active" : ""}" onclick="setInlineRating('${r}')">${r}</button>`).join("");
}
function setInlineRating(rating){
  ui.inlineRating = rating;
  buildInlineRatingButtons();
}
function showInlineError(message){
  const el = document.getElementById("inlineError");
  el.textContent = message;
  el.style.display = "block";
}
function hideInlineError(){
  const el = document.getElementById("inlineError");
  if(!el) return;
  el.textContent = "";
  el.style.display = "none";
}
function addInlinePlayer(){
  hideInlineError();
  const name = document.getElementById("inlineName").value.trim();
  const position = document.getElementById("inlinePosition").value;
  const origin = document.getElementById("inlineOrigin").value;
  let attack = Number(document.getElementById("inlineAttack").value || 0);
  const defense = Number(document.getElementById("inlineDefense").value || 0);

  if(!name){
    showInlineError("Введите имя игрока");
    return;
  }
  if(position === "ВРТ") attack = 0;

  const lineup = canBeStarter(position) ? "starter" : "bench";
  state.players.push({
    id: Date.now(),
    name,
    position,
    rating: ui.inlineRating,
    origin,
    attack,
    defense,
    lineup,
    injured: false
  });
  saveState();

  document.getElementById("inlineName").value = "";
  document.getElementById("inlinePosition").value = "НАП";
  document.getElementById("inlineOrigin").value = "СНГ";
  document.getElementById("inlineAttack").value = "";
  document.getElementById("inlineDefense").value = "";
  ui.inlineRating = "2×";

  renderAll();
}
function openEditModal(id){
  const player = state.players.find(p=>p.id===id);
  if(!player) return;
  ui.editingId = id;
  ui.rating = player.rating;
  document.getElementById("playerModalTitle").textContent = "Редактировать игрока";
  document.getElementById("formName").value = player.name;
  document.getElementById("formPosition").value = player.position;
  document.getElementById("formOrigin").value = player.origin || "СНГ";
  document.getElementById("formAttack").value = player.attack;
  document.getElementById("formDefense").value = player.defense;
  document.getElementById("deleteFromEditBtn").style.display = "inline-flex";
  hideFormError();
  buildModalRatingButtons();
  showModal("playerModalBg");
}
function buildModalRatingButtons(){
  const container = document.getElementById("ratingGrid");
  container.innerHTML = RATINGS.map(r=>`<button class="rating-btn ${ui.rating===r ? "active" : ""}" onclick="setModalRating('${r}')">${r}</button>`).join("");
}
function setModalRating(rating){
  ui.rating = rating;
  buildModalRatingButtons();
}
function showFormError(message){
  const el = document.getElementById("formError");
  el.textContent = message;
  el.style.display = "block";
}
function hideFormError(){
  const el = document.getElementById("formError");
  el.textContent = "";
  el.style.display = "none";
}
function savePlayerFromModal(){
  hideFormError();
  const name = document.getElementById("formName").value.trim();
  const position = document.getElementById("formPosition").value;
  const origin = document.getElementById("formOrigin").value;
  let attack = Number(document.getElementById("formAttack").value || 0);
  const defense = Number(document.getElementById("formDefense").value || 0);

  if(!name){
    showFormError("Введите имя игрока");
    return;
  }
  if(position === "ВРТ") attack = 0;

  if(ui.editingId){
    const current = state.players.find(p=>p.id===ui.editingId);
    if(!current) return;
    if(current.lineup === "starter" && !canBeStarter(position, current.id)){
      showFormError(`Нельзя изменить позицию: в основе уже максимум ${STARTER_LIMITS[position]} для ${position}`);
      return;
    }
    state.players = state.players.map(p=>p.id===ui.editingId ? { ...p, name, position, origin, rating:ui.rating, attack, defense } : p);
  }

  saveState();
  hideModal("playerModalBg");
  ui.editingId = null;
  renderAll();
}
function toggleInjury(id){
  state.players = state.players.map(p=>p.id===id ? { ...p, injured: !p.injured } : p);
  saveState();
  renderAll();
}
function toggleLineup(id){
  const target = state.players.find(p=>p.id===id);
  if(!target) return;
  if(target.lineup === "starter"){
    target.lineup = "bench";
  } else {
    if(!canBeStarter(target.position, target.id)){
      alert(`В основе уже максимум ${STARTER_LIMITS[target.position]} игрок(а) позиции ${target.position}`);
      return;
    }
    target.lineup = "starter";
  }
  saveState();
  renderAll();
}
function requestDelete(id){
  ui.deleteId = id;
  const player = state.players.find(p=>p.id===id);
  document.getElementById("deleteInfo").innerHTML = player ? `<div style="font-size:18px;font-weight:800">${escapeHtml(player.name)}</div><div class="hint" style="margin-top:6px">${player.position} · ${player.lineup==="starter" ? "Основа" : "Запас"} · ${player.origin||"СНГ"}</div>` : "";
  showModal("deleteModalBg");
}
function confirmDelete(){
  if(!ui.deleteId) return;
  state.players = state.players.filter(p=>p.id!==ui.deleteId);
  if(ui.editingId === ui.deleteId){
    ui.editingId = null;
    hideModal("playerModalBg");
  }
  ui.deleteId = null;
  saveState();
  hideModal("deleteModalBg");
  renderAll();
}
function addMatchByResult(value){
  state.matches.unshift({
    id: Date.now(),
    result: value,
    createdAt: new Date().toLocaleString("ru-RU")
  });
  saveState();
  renderTop();
  renderMatches();
}
function deleteMatch(id){
  state.matches = state.matches.filter(match => match.id !== id);
  saveState();
  renderTop();
  renderMatches();
}
function showModal(id){ document.getElementById(id).classList.add("show"); }
function hideModal(id){ document.getElementById(id).classList.remove("show"); }
function resetAllData(){
  if(!confirm("Сбросить весь состав и историю матчей?")) return;
  state = { players:[...initialPlayers], matches:[] };
  ui.rating = "2×";
  ui.inlineRating = "2×";
  saveState();
  renderAll();
}

document.querySelectorAll("[data-screen]").forEach(btn=>{
  btn.addEventListener("click", ()=>setActiveScreen(btn.dataset.screen));
});
document.getElementById("cancelPlayerBtn").onclick = ()=>hideModal("playerModalBg");
document.getElementById("savePlayerBtn").onclick = savePlayerFromModal;
document.getElementById("deleteFromEditBtn").onclick = ()=>{ if(ui.editingId) requestDelete(ui.editingId); };
document.getElementById("cancelDeleteBtn").onclick = ()=>hideModal("deleteModalBg");
document.getElementById("confirmDeleteBtn").onclick = confirmDelete;
document.getElementById("playerModalBg").addEventListener("click", e=>{ if(e.target.id==="playerModalBg") hideModal("playerModalBg"); });
document.getElementById("deleteModalBg").addEventListener("click", e=>{ if(e.target.id==="deleteModalBg") hideModal("deleteModalBg"); });

renderAll();
</script>
</body>
</html>
